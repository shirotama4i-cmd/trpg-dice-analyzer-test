<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ココフォリア・ダイスログ分析ツール（テスト環境）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .drop-zone {
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3498db;
            background-color: #ecf0f1;
        }
        #output {
            margin-top: 30px;
            padding: 25px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }
        .file-info {
            margin-top: 10px;
            font-weight: bold;
            color: #27ae60;
        }
        .header-title {
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .section-total {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #555;
        }
        /* ソートボタンエリアのスタイル */
        .sort-actions {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        .sort-btn {
            background-color: #fff;
            color: #2c3e50;
            border: 1px solid #cbd5e1;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .sort-btn:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }
        .sort-btn.active {
            background-color: #3498db;
            color: #fff;
            border-color: #3498db;
        }
        .char-block {
            background-color: #fafbfc;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .char-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .meta-info {
            font-size: 14px;
            margin-bottom: 15px;
            color: #666;
        }
        .meta-info ul {
            margin: 5px 0;
            padding-left: 20px;
        }
        .grid-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .grid-table th, .grid-table td {
            border: 1px solid #d1d5da;
            padding: 8px 12px;
            text-align: center;
        }
        .grid-table th {
            background-color: #f1f3f5;
            color: #495057;
            font-weight: bold;
        }
        .grid-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .highlight-good {
            background-color: #e8f5e9 !important;
            color: #2e7d32;
            font-weight: bold;
        }
        .highlight-bad {
            background-color: #ffebee !important;
            color: #c62828;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎲 ココフォリア・ダイスログ分析ツール（テスト環境）</h1>
    
    <div class="drop-zone" id="dropZone">
        ここにココフォリアのログファイル（HTML）をドラッグ＆ドロップするか、<br>
        ここをクリックしてファイルを選択してください。
        <input type="file" id="fileInput" accept=".html" style="display: none;">
        <div class="file-info" id="fileInfo"></div>
    </div>

    <div id="output"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const fileInfo = document.getElementById('fileInfo');

        // グローバル変数として解析結果データを保持（ソート時に再利用するため）
        let currentAnalysisData = null; 

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            fileInfo.textContent = `読み込み中: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                analyzeLog(e.target.result);
            };
            reader.readAsText(file, 'UTF-8');
        }

        function groupByFlexibleName(rawRecords) {
            const uniqueNames = Array.from(new Set(rawRecords.map(r => r.rawName)))
                                     .filter(name => name.length > 0)
                                     .sort((a, b) => b.length - a.length);

            const nameMapping = {};

            uniqueNames.forEach(name => {
                if (nameMapping[name]) return;

                const targetGroup = uniqueNames.filter(otherName => {
                    return name.includes(otherName) || otherName.includes(name);
                });

                const representativeName = targetGroup[0];
                targetGroup.forEach(gName => {
                    nameMapping[gName] = representativeName;
                });
            });

            const charMap = {};
            rawRecords.forEach(r => {
                const unifiedName = nameMapping[r.rawName] || r.rawName;
                if (!charMap[unifiedName]) charMap[unifiedName] = [];
                charMap[unifiedName].push(r);
            });

            return charMap;
        }

        function analyzeLog(htmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const pTags = doc.querySelectorAll('p');
            
            const rawRecords = [];
            
            pTags.forEach(p => {
                const spans = p.querySelectorAll('span');
                if (spans.length < 3) return;
                
                const channel = spans[0].textContent.trim();
                const rawName = spans[1].textContent.trim();
                const content = spans[2].textContent.trim();
                
                if (content.includes('＞')) {
                    const parts = content.split('＞').map(x => x.trim());
                    const diceExpr = parts[0];
                    const diceValueStr = parts[1] || "";
                    const diceResult = parts[2] || "通常ロール";
                    
                    const matchVal = diceValueStr.match(/\d+/);
                    if (!matchVal) return;
                    const diceValue = parseInt(matchVal[0], 10);
                    
                    const is1d100 = diceExpr.toUpperCase().includes('1D100') || diceExpr.toUpperCase().includes('CCB');
                    const skillMatch = diceExpr.match(/【(.*?)】/);
                    const skillName = skillMatch ? skillMatch[1] : "素振り/その他";
                    
                    rawRecords.push({
                        channel, rawName, diceExpr, skillName, diceValue, diceResult, is1d100
                    });
                }
            });

            if (rawRecords.length === 0) {
                output.style.display = 'block';
                output.innerHTML = "<p>ダイスログが検出されませんでした。</p>";
                return;
            }

            const charMap = groupByFlexibleName(rawRecords);
            
            // ソート用に「各キャラの数値データ」を事前に構造化して保持
            currentAnalysisData = {
                totalCount: rawRecords.length,
                characters: Object.keys(charMap).map(char => {
                    const charList = charMap[char];
                    const d100List = charList.filter(r => r.is1d100);
                    
                    // クリティカル数・ファンブル数を集計
                    const criticalCount = d100List.filter(r => /クリティカル|決定的成功/.test(r.diceResult)).length;
                    const fumbleCount = d100List.filter(r => /ファンブル|致命的失敗/.test(r.diceResult)).length;

                    return {
                        name: char,
                        list: charList,
                        d100List: d100List,
                        criticalCount: criticalCount,
                        fumbleCount: fumbleCount
                    };
                })
            };

            // 初回は名前順でレポート生成
            generateReport('default');
        }

        // ソート種別を指定してレポートを画面に出力する関数
        function generateReport(sortBy = 'default') {
            if (!currentAnalysisData) return;

            output.innerHTML = ""; 

            let html = `<div class="header-title">ココフォリア・ダイスログ分析レポート</div>`;
            html += `<div class="section-total">総ダイスロール回数: ${currentAnalysisData.totalCount} 回</div>`;

            // ボタンエリアの追加
            html += `<div class="sort-actions">`;
            html += `  <button class="sort-btn ${sortBy==='default'?'active':''}" onclick="generateReport('default')">標準（名前順）</button>`;
            html += `  <button class="sort-btn ${sortBy==='critical'?'active':''}" onclick="generateReport('critical')">✨ クリティカルが多い順</button>`;
            html += `  <button class="sort-btn ${sortBy==='fumble'?'active':''}" onclick="generateReport('fumble')">💥 ファンブルが多い順</button>`;
            html += `</div>`;

            const RESULT_ORDER = [
                "クリティカル", "決決定的成功", "イクストリーム成功", "ハード成功", 
                "スペシャル", "成功", "失敗", "致命的失敗", "ファンブル"
            ];

            // データのコピーを作ってソート処理
            let sortedChars = [...currentAnalysisData.characters];
            if (sortBy === 'critical') {
                sortedChars.sort((a, b) => b.criticalCount - a.criticalCount || a.name.localeCompare(b.name, 'ja'));
            } else if (sortBy === 'fumble') {
                sortedChars.sort((a, b) => b.fumbleCount - a.fumbleCount || a.name.localeCompare(b.name, 'ja'));
            } else {
                // デフォルトは名前の五十音・アルファベット順
                sortedChars.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            }

            // ループ処理で各キャラクターのHTMLを組み立て
            sortedChars.forEach(charData => {
                const char = charData.name;
                const charList = charData.list;
                const d100List = charData.d100List;
                
                html += `<div class="char-block">`;
                html += `<h3 class="char-name">キャラクター: ${char}</h3>`;
                html += `<div class="meta-info">`;
                html += `  <div>・総ダイス数: <strong>${charList.length} 回</strong></div>`;

                if (d100List.length > 0) {
                    const sum = d100List.reduce((acc, r) => acc + r.diceValue, 0);
                    const avg = sum / d100List.length;
                    html += `  <div>・1D100 平均出目: <strong>${avg.toFixed(2)}</strong> (低いほど出目が良い)</div>`;
                    html += `  <div>・クリティカル総数: <span style="color:#2e7d32; font-weight:bold;">${charData.criticalCount} 回</span> / ファンブル総数: <span style="color:#c62828; font-weight:bold;">${charData.fumbleCount} 回</span></div>`;
                    html += `</div>`; 

                    const resultsCount = {};
                    d100List.forEach(r => {
                        resultsCount[r.diceResult] = (resultsCount[r.diceResult] || 0) + 1;
                    });

                    html += `<table class="grid-table">`;
                    html += `  <thead><tr><th>判定結果</th><th>回数</th><th>割合 (%)</th></tr></thead>`;
                    html += `  <tbody>`;

                    const printedResults = new Set();

                    RESULT_ORDER.forEach(resName => {
                        Object.keys(resultsCount).forEach(k => {
                            if (k.includes(resName) && !printedResults.has(k)) {
                                const count = resultsCount[k];
                                const pct = (count / d100List.length) * 100;
                                
                                let rowClass = "";
                                if (/クリティカル|決定的成功/.test(k)) rowClass = ' class="highlight-good"';
                                if (/ファンブル|致命的失敗/.test(k)) rowClass = ' class="highlight-bad"';

                                html += `    <tr${rowClass}><td>${k}</td><td>${count}回</td><td>${pct.toFixed(1)}%</td></tr>`;
                                printedResults.add(k);
                            }
                        });
                    });

                    Object.keys(resultsCount).forEach(k => {
                        if (!printedResults.has(k)) {
                            const count = resultsCount[k];
                            const pct = (count / d100List.length) * 100;
                            html += `    <tr><td>${k}</td><td>${count}回</td><td>${pct.toFixed(1)}%</td></tr>`;
                        }
                    });

                    html += `  </tbody></table>`;

                    const dramaticMoments = d100List.filter(r => 
                        /クリティカル|決定的成功|ファンブル|致命的失敗/.test(r.diceResult)
                    );

                    if (dramaticMoments.length > 0) {
                        html += `<div class="meta-info" style="margin-top:15px;">`;
                        html += `  <strong>・クリティカル/ファンブル詳細:</strong>`;
                        html += `  <ul>`;
                        dramaticMoments.forEach(r => {
                            html += `    <li>[${r.skillName}] 出目:${r.diceValue} ＞ ${r.diceResult}</li>`;
                        });
                        html += `  </ul>`;
                        html += `</div>`;
                    }
                } else {
                    html += `  <div>・1D100判定のログはありません(ダメージダイス等のみ)</div>`;
                    html += `</div>`; 
                }

                const skillCount = {};
                charList.forEach(r => {
                    skillCount[r.skillName] = (skillCount[r.skillName] || 0) + 1;
                });
                const sortedSkills = Object.entries(skillCount).sort((a, b) => b[1] - a[1]).slice(0, 3);
                
                html += `<div class="meta-info">`;
                html += `  <strong>・よく使用した技能/項目トップ3:</strong>`;
                html += `  <ul>`;
                sortedSkills.forEach(([sName, count]) => {
                    html += `    <li>${sName}: ${count}回</li>`;
                });
                html += `  </ul>`;
                html += `</div>`;

                html += `</div>`; 
            });

            output.innerHTML = html;
            output.style.display = 'block';
            fileInfo.textContent = "解析が完了しました！";
        }
    </script>
</body>
</html>
